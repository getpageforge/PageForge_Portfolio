<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Parceiros — Admin PageForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../painel/admin.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
    .tab-btn { background: none; border: none; color: var(--muted); font-family: var(--font-display); font-size: 1.1rem; font-weight: 600; padding: 10px 20px; cursor: pointer; position: relative; transition: color 0.3s; }
    .tab-btn.active { color: #fff; }
    .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--orange); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    .table-container { overflow-x: auto; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 30px; }
    th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
    th { color: var(--muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; }
    
    .status-select { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 0.9rem; }
    .status-select:focus { outline: none; border-color: var(--orange); }
    
    .input-val { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: #fff; padding: 6px; border-radius: 6px; width: 90px; }
    .btn-action { background: var(--orange); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .btn-action:hover { background: var(--orange-hot); }
    .btn-danger { background: #ef4444; }
  </style>
</head>
<body>
  <div class="ambient-blob blob-1"></div>
  <header class="admin-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-text"><span class="brand-name">PageForge</span> <span class="brand-sep">·</span> <span class="brand-sub">CRM Parceiros</span></div>
      </div>
      <div class="header-center">
        <h1 class="header-title">Gestão de Parceiros</h1>
      </div>
      <div class="header-status"><span class="status-dot"></span><span class="status-text">Logado</span></div>
    </div>
  </header>

  <main class="admin-main">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('indicacoes')">Indicações / CRM</button>
      <button class="tab-btn" onclick="switchTab('parceiros')">Parceiros</button>
    </div>

    <!-- ABA INDICAÇÕES -->
    <div id="indicacoes" class="tab-content active">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Cliente / Contato</th>
              <th>Parceiro Indicou</th>
              <th>Status CRM</th>
              <th>Valor Proj.</th>
              <th>Comissão</th>
              <th>Status Pag.</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="refTbody">
            <tr><td colspan="7" style="text-align:center;color:var(--muted);">Carregando indicações...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ABA PARCEIROS -->
    <div id="parceiros" class="tab-content">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Nome / Whats</th>
              <th>Email</th>
              <th>Cidade</th>
              <th>Como conheceu</th>
              <th>Data Cad.</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="partTbody">
            <tr><td colspan="7" style="text-align:center;color:var(--muted);">Carregando parceiros...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="../../js/supabase-config.js"></script>
  <script>
    // Tab logic
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    async function loadData() {
      // Load Referrals
      const { data: refs, error: e1 } = await supabase
        .from('referrals')
        .select(`*, partners(name)`)
        .order('created_at', { ascending: false });

      const refTbody = document.getElementById('refTbody');
      refTbody.innerHTML = '';
      if(e1) { console.error(e1); refTbody.innerHTML='<tr><td colspan="7">Erro ao carregar</td></tr>'; }
      else if(refs.length === 0) refTbody.innerHTML='<tr><td colspan="7" style="text-align:center">Nenhuma indicação.</td></tr>';
      else {
        refs.forEach(r => {
          const tr = document.createElement('tr');
          const statuses = ['Novo Lead', 'Contato', 'Briefing', 'Orçamento', 'Negociação', 'Pagamento', 'Em desenvolvimento', 'Entregue', 'Finalizado'];
          let options = statuses.map(s => `<option value="${s}" ${r.status===s?'selected':''}>${s}</option>`).join('');
          
          let pStatus = ['Pendente', 'Liberada', 'Paga'];
          let pOptions = pStatus.map(s => `<option value="${s}" ${r.commission_status===s?'selected':''}>${s}</option>`).join('');

          tr.innerHTML = `
            <td><strong>${r.client_name}</strong><br><span style="color:var(--muted);font-size:0.8rem">${r.phone}</span></td>
            <td>${r.partners?.name || 'Desconhecido'}</td>
            <td><select id="st_${r.id}" class="status-select">${options}</select></td>
            <td>R$ <input type="number" id="v_${r.id}" class="input-val" value="${r.project_value}"></td>
            <td>R$ <input type="number" id="c_${r.id}" class="input-val" value="${r.commission_value}"></td>
            <td><select id="cs_${r.id}" class="status-select">${pOptions}</select></td>
            <td><button class="btn-action" onclick="updateRef('${r.id}')">Salvar</button></td>
          `;
          refTbody.appendChild(tr);
        });
      }

      // Load Partners
      const { data: parts, error: e2 } = await supabase.from('partners').select('*').order('created_at', { ascending: false });
      const partTbody = document.getElementById('partTbody');
      partTbody.innerHTML = '';
      if(e2) { console.error(e2); }
      else if(parts.length===0) partTbody.innerHTML='<tr><td colspan="7" style="text-align:center">Nenhum parceiro.</td></tr>';
      else {
        parts.forEach(p => {
          const tr = document.createElement('tr');
          const dt = new Date(p.created_at).toLocaleDateString();
          tr.innerHTML = `
            <td><strong>${p.name}</strong><br><span style="color:var(--muted);font-size:0.8rem">${p.whatsapp}</span></td>
            <td>${p.email || ''}</td>
            <td>${p.city || ''}</td>
            <td>${p.how_knew || ''}</td>
            <td>${dt}</td>
            <td><select id="pst_${p.id}" class="status-select">
              <option value="Pendente" ${p.status==='Pendente'?'selected':''}>Pendente</option>
              <option value="Aprovado" ${p.status==='Aprovado'?'selected':''}>Aprovado</option>
              <option value="Bloqueado" ${p.status==='Bloqueado'?'selected':''}>Bloqueado</option>
            </select></td>
            <td>
              <button class="btn-action" onclick="updatePartner('${p.id}')">Salvar</button>
              <button class="btn-action btn-danger" onclick="deletePartner('${p.id}')">Excluir</button>
            </td>
          `;
          partTbody.appendChild(tr);
        });
      }
    }

    async function updateRef(id) {
      const st = document.getElementById('st_'+id).value;
      const val = parseFloat(document.getElementById('v_'+id).value) || 0;
      const cVal = parseFloat(document.getElementById('c_'+id).value) || 0;
      const cs = document.getElementById('cs_'+id).value;
      
      let updateData = { status: st, project_value: val, commission_value: cVal, commission_status: cs };
      if (cs === 'Paga') updateData.paid_at = new Date().toISOString();

      const { error } = await supabase.from('referrals').update(updateData).eq('id', id);
      if(error) alert('Erro: ' + error.message);
      else alert('Indicação atualizada!');
    }

    async function updatePartner(id) {
      const st = document.getElementById('pst_'+id).value;
      const { error } = await supabase.from('partners').update({ status: st }).eq('id', id);
      if(error) alert('Erro: ' + error.message);
      else alert('Parceiro atualizado!');
    }

    async function deletePartner(id) {
      if(!confirm('Tem certeza? Isso excluirá o parceiro e todas suas indicações.')) return;
      const { error } = await supabase.from('partners').delete().eq('id', id);
      if(error) alert('Erro: ' + error.message);
      else loadData();
    }

    window.onload = loadData;
  </script>
</body>
</html>

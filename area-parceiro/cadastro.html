<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Parceiro | PageForge</title>
  <meta name="description" content="Cadastre-se no programa de parceiros da PageForge e comece a ganhar comissões indicando clientes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="../Visuals/style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js" defer></script>
  <style>
    /* ─── FIX: Cursor visível nesta página ─── */
    *, *::before, *::after { cursor: auto !important; }
    a, button, [role="button"], input, select, label { cursor: pointer !important; }
    input[type="text"], input[type="email"], input[type="password"], textarea { cursor: text !important; }

    /* ─── Layout ─── */
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 24px 60px;
      box-sizing: border-box;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 20%, rgba(245, 106, 0, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 20% 80%, rgba(192, 57, 43, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      width: 100%;
      max-width: 520px;
      position: relative;
      z-index: 1;
    }

    /* Logo / Back */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .top-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--text, #F0EDE8);
      text-decoration: none;
    }
    .top-logo img { width: 30px; height: 30px; border-radius: 7px; }
    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted, rgba(240,237,232,0.5));
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .btn-back:hover { color: var(--text, #F0EDE8); }

    /* Card */
    .cadastro-card {
      background: rgba(14,14,14,0.85);
      border: 1px solid var(--border, rgba(255,255,255,0.08));
      border-radius: 24px;
      padding: 40px 36px 36px;
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      box-shadow: 0 40px 100px rgba(0,0,0,0.72), 0 0 60px rgba(245,106,0,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
    }
    .cadastro-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,106,0,0.65), transparent);
      border-radius: 24px 24px 0 0;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text, #F0EDE8);
      margin-bottom: 8px;
    }
    .card-sub {
      color: var(--muted, rgba(240,237,232,0.5));
      font-size: 0.88rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    /* Benefícios rápidos */
    .benefits-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .benefit-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,106,0,0.08);
      border: 1px solid rgba(245,106,0,0.2);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 0.8rem;
      color: rgba(245,106,0,0.9);
      font-weight: 500;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-grid .form-group.full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group label {
      color: var(--muted, rgba(240,237,232,0.5));
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group .optional {
      color: rgba(240,237,232,0.3);
      font-size: 0.7rem;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }
    .form-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border, rgba(255,255,255,0.08));
      padding: 12px 14px;
      border-radius: 11px;
      color: var(--text, #F0EDE8);
      font-family: var(--font-body);
      font-size: 0.92rem;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      outline: none;
      box-sizing: border-box;
      width: 100%;
    }
    .form-input:focus {
      border-color: rgba(245,106,0,0.5);
      background: rgba(245,106,0,0.04);
      box-shadow: 0 0 0 3px rgba(245,106,0,0.1);
    }
    .form-input::placeholder { color: rgba(240,237,232,0.2); }

    /* Divisor de seção */
    .section-divider {
      margin: 24px 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(240,237,232,0.3);
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border, rgba(255,255,255,0.08));
    }

    /* Submit */
    .btn-submit {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--orange, #F56A00) 0%, var(--orange-hot, #FF4500) 100%);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      border: 1px solid rgba(255,200,120,0.2);
      cursor: pointer !important;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 24px;
      box-shadow: 0 0 40px rgba(245,106,0,0.3), 0 4px 20px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 60px rgba(245,106,0,0.45), 0 8px 28px rgba(0,0,0,0.5);
    }
    .btn-submit:active { transform: translateY(0) scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed !important; transform: none; }

    #formMsg {
      margin-top: 16px;
      text-align: center;
      font-weight: 500;
      font-size: 0.9rem;
      min-height: 20px;
      border-radius: 8px;
      padding: 0;
      transition: all 0.3s;
    }
    #formMsg.success {
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.2);
      color: #4ade80;
      padding: 14px 16px;
    }
    #formMsg.error {
      background: rgba(255,100,100,0.08);
      border: 1px solid rgba(255,100,100,0.2);
      color: #ff6b6b;
      padding: 14px 16px;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: var(--muted, rgba(240,237,232,0.5));
      font-size: 0.88rem;
    }
    .login-link a {
      color: var(--orange, #F56A00);
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      body { padding: 24px 16px 40px; }
      .cadastro-card { padding: 28px 20px 24px; border-radius: 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .card-title { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <!-- Top bar -->
    <div class="top-bar">
      <a href="/index.html" class="top-logo">
        <img src="../images/iconpf.png" alt="PageForge">
        PageForge
      </a>
      <a href="/area-parceiro/login.html" class="btn-back">
        <i class="ph-bold ph-arrow-left"></i>
        Já tenho conta
      </a>
    </div>

    <!-- Card principal -->
    <div class="cadastro-card">
      <h1 class="card-title">Torne-se Parceiro</h1>
      <p class="card-sub">
        Indique clientes para a PageForge e ganhe comissão por cada projeto fechado. Simples assim.
      </p>

      <!-- Benefícios -->
      <div class="benefits-row">
        <span class="benefit-tag"><i class="ph-bold ph-money"></i> 20% de comissão</span>
        <span class="benefit-tag"><i class="ph-bold ph-chart-line-up"></i> Dashboard em tempo real</span>
        <span class="benefit-tag"><i class="ph-bold ph-check-circle"></i> 100% gratuito</span>
      </div>

      <form id="partnerForm" onsubmit="submitPartner(event)" novalidate>

        <!-- Seção: Dados pessoais -->
        <div class="section-divider">Dados Pessoais</div>
        <div class="form-grid">
          <div class="form-group full">
            <label for="p_name">Nome Completo</label>
            <input type="text" id="p_name" class="form-input" required placeholder="Seu nome completo" autocomplete="name">
          </div>
          <div class="form-group full">
            <label for="p_email">E-mail <span class="optional">(será seu login)</span></label>
            <input type="email" id="p_email" class="form-input" required placeholder="seu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="p_pass">Senha</label>
            <input type="password" id="p_pass" class="form-input" required minlength="6" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="p_whatsapp">WhatsApp</label>
            <input type="text" id="p_whatsapp" class="form-input" required placeholder="(XX) XXXXX-XXXX">
          </div>
        </div>

        <!-- Seção: Redes e localização -->
        <div class="section-divider">Informações Adicionais</div>
        <div class="form-grid">
          <div class="form-group">
            <label for="p_instagram">Instagram <span class="optional">(opcional)</span></label>
            <input type="text" id="p_instagram" class="form-input" placeholder="@seuusuario">
          </div>
          <div class="form-group">
            <label for="p_city">Cidade / Estado</label>
            <input type="text" id="p_city" class="form-input" required placeholder="São Paulo, SP">
          </div>
          <div class="form-group full">
            <label for="p_how">Como conheceu a PageForge?</label>
            <input type="text" id="p_how" class="form-input" required placeholder="Instagram, indicação, Google...">
          </div>
          <div class="form-group full">
            <label for="p_exp">Experiência com vendas <span class="optional">(opcional)</span></label>
            <input type="text" id="p_exp" class="form-input" placeholder="Ex: Gestor de tráfego há 2 anos">
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit">
          <i class="ph-bold ph-user-plus"></i>
          Criar minha conta gratuita
        </button>
      </form>

      <div id="formMsg"></div>

      <p class="login-link">
        Já tem conta? <a href="/area-parceiro/login.html">Faça login aqui</a>
      </p>
    </div>
  </div>

  <script src="../js/supabase-config.js" defer></script>
  <script defer>
    // Verificar se já está logado
    window.addEventListener('load', async () => {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          window.location.href = '/area-parceiro/index.html';
        }
      } catch(e) {}
    });

    async function submitPartner(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      const msg = document.getElementById('formMsg');

      // Validações
      const email = document.getElementById('p_email').value.trim();
      const pass = document.getElementById('p_pass').value;
      const name = document.getElementById('p_name').value.trim();
      const whatsapp = document.getElementById('p_whatsapp').value.trim();
      const city = document.getElementById('p_city').value.trim();
      const howKnew = document.getElementById('p_how').value.trim();

      if (!name || !email || !pass || !whatsapp || !city || !howKnew) {
        showMsg('Por favor, preencha todos os campos obrigatórios.', 'error');
        return;
      }

      if (pass.length < 6) {
        showMsg('A senha deve ter pelo menos 6 caracteres.', 'error');
        return;
      }

      btn.innerHTML = '<i class="ph-bold ph-circle-notch"></i> Criando conta...';
      btn.disabled = true;
      msg.className = '';
      msg.textContent = '';

      try {
        // Usar API serverless (usa service_role, contorna RLS, confirma e-mail)
        const response = await fetch('/api/partner-register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email,
            password: pass,
            name,
            whatsapp,
            instagram: document.getElementById('p_instagram').value.trim(),
            city,
            how_knew: howKnew,
            experience: document.getElementById('p_exp').value.trim()
          })
        });

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.error || 'Erro ao criar conta. Tente novamente.');
        }

        // Sucesso! Fazer login automático
        showMsg('✓ Conta criada! Fazendo login...', 'success');

        const { error: loginErr } = await supabase.auth.signInWithPassword({ email, password: pass });

        if (loginErr) {
          // Mesmo que o login falhe, o cadastro foi feito
          showMsg('✓ Conta criada com sucesso! Redirecionando...', 'success');
          setTimeout(() => { window.location.href = '/area-parceiro/login.html?cadastro=ok'; }, 1500);
        } else {
          setTimeout(() => { window.location.href = '/area-parceiro/index.html'; }, 1000);
        }

      } catch (err) {
        showMsg(err.message || 'Erro inesperado. Tente novamente.', 'error');
        btn.innerHTML = '<i class="ph-bold ph-user-plus"></i> Criar minha conta gratuita';
        btn.disabled = false;
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById('formMsg');
      msg.className = type;
      msg.textContent = text;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.8">
  <title>Nova Indicação - Área do Parceiro | PageForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Visuals/style.css" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: var(--bg); padding-top: 80px; }
    .dash-container { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .dash-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; }
    .btn-back { display: flex; align-items: center; gap: 8px; color: var(--muted); text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .btn-back:hover { color: #fff; }

    .form-container { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px; padding: 32px; backdrop-filter: blur(20px); }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.95rem; }
    .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 14px 16px; border-radius: 10px; color: #fff; font-family: var(--font-body); font-size: 1rem; transition: border-color 0.3s; }
    .form-input:focus { outline: none; border-color: var(--orange); background: rgba(255,255,255,0.08); }
    textarea.form-input { min-height: 120px; resize: vertical; }
    .btn-submit { padding: 16px 32px; border-radius: 10px; background: linear-gradient(135deg, var(--orange) 0%, var(--orange-hot) 100%); color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; border: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; width: 100%; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 106, 0, 0.3); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
    
    #msg { margin-top: 20px; text-align: center; font-weight: 500; font-size: 1.1rem; }
  </style>
</head>
<body>
  <nav id="navbar" style="background: rgba(8,8,8,0.9); border-bottom: 1px solid var(--border);">
    <div class="container nav-inner">
      <a href="/index.html" class="nav-logo">
        <img src="../images/iconpf.png" alt="PageForge Logo" class="nav-logo-icon">
        PageForge | Parceiros
      </a>
    </div>
  </nav>

  <div class="dash-container">
    <div class="dash-header reveal">
      <h1 class="dash-title">Nova Indicação</h1>
      <a href="index.html" class="btn-back"><i class="ph-bold ph-arrow-left"></i> Voltar ao Painel</a>
    </div>

    <div class="form-container reveal reveal-d1">
      <form id="referralForm" onsubmit="submitReferral(event)">
        <div class="form-group">
          <label>Nome do Cliente / Contato</label>
          <input type="text" id="r_name" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Nome da Empresa (Opcional)</label>
          <input type="text" id="r_company" class="form-input">
        </div>
        <div class="form-group">
          <label>Telefone / WhatsApp do Cliente</label>
          <input type="text" id="r_phone" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Instagram do Cliente (Opcional)</label>
          <input type="text" id="r_instagram" class="form-input">
        </div>
        <div class="form-group">
          <label>Serviço Desejado (Ex: Landing Page, Portfólio, Não sabe)</label>
          <input type="text" id="r_service" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Observações Adicionais</label>
          <textarea id="r_notes" class="form-input" placeholder="O que mais precisamos saber sobre esse projeto?"></textarea>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Enviar Indicação</button>
      </form>
      <div id="msg"></div>
    </div>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script>
    let partnerId = null;

    window.addEventListener('load', async () => {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));

      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = '/area-parceiro/login.html';
        return;
      }
      
      const userId = session.user.id;
      const { data: partnerData } = await supabase
        .from('partners')
        .select('id')
        .eq('user_id', userId)
        .single();
        
      if (partnerData) {
        partnerId = partnerData.id;
      }
    });

    async function submitReferral(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      
      if (!partnerId) {
        msg.style.color = 'var(--red)';
        msg.textContent = 'Erro de autenticação. Recarregue a página.';
        return;
      }

      btn.textContent = 'Enviando...';
      btn.disabled = true;
      msg.textContent = '';

      const { error } = await supabase.from('referrals').insert([{
        partner_id: partnerId,
        client_name: document.getElementById('r_name').value,
        company: document.getElementById('r_company').value,
        phone: document.getElementById('r_phone').value,
        instagram: document.getElementById('r_instagram').value,
        service: document.getElementById('r_service').value,
        notes: document.getElementById('r_notes').value
      }]);

      if (error) {
        msg.style.color = 'var(--red)';
        msg.textContent = 'Erro ao enviar: ' + error.message;
        btn.textContent = 'Enviar Indicação';
        btn.disabled = false;
      } else {
        msg.style.color = '#4ade80';
        msg.textContent = 'Indicação enviada com sucesso! Você será redirecionado.';
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      }
    }
  </script>
</body>
</html>

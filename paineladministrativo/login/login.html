<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageForge — Painel Administrativo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="bg-layer"></div>
  <div class="noise"></div>
  <div class="grid-texture"></div>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="login-wrapper">
    <div class="login-card">

      <div class="card-glow"></div>
      <div class="card-top-border"></div>

      <div class="brand">
        <div class="brand-icon">
           <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="10" height="10" rx="2.5" fill="#F56A00"/>
            <rect x="12" width="10" height="10" rx="2.5" fill="#FF4500" opacity="0.7"/>
            <rect y="12" width="10" height="10" rx="2.5" fill="#FF4500" opacity="0.7"/>
            <rect x="12" y="12" width="10" height="10" rx="2.5" fill="#F56A00" opacity="0.4"/>
          </svg>
        </div>
        <span class="brand-name">PageForge</span>
      </div>

      <div class="card-header">
        <h1 class="card-title">Painel Administrativo</h1>
        <p class="card-subtitle">Acesso restrito</p>
      </div>

      <form class="login-form" action="#" method="post" autocomplete="off">
        <div class="field-group">
          <label class="field-label" for="senha">Senha</label>
          <div class="field-wrap">
            <span class="field-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              class="field-input"
              type="password"
              id="senha"
              name="senha"
              placeholder="Digite sua senha"
              required
              autocomplete="current-password"
            >
          </div>
        </div>

        <button class="btn-enter" type="submit">
          <span class="btn-shimmer"></span>
          <span class="btn-text">Entrar</span>
          <span class="btn-arrow">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </span>
        </button>
      </form>

      <p class="card-footer-note">
        <span class="lock-dot"></span>
        Conexão segura e criptografada
      </p>

    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
